# УЗКИЕ МЕСТА / BOTTLENECKS:
#   * replay_trajectory_to_spans (src/lib.rs:97): loop over events, inside: always allocates HashMap + json! for "raw" wrapper in add_event, then conditional clone() of current Span (which clones HashMap<String,Value> + Vec<Value> of prior events). For i%4 triggers. Results in heavy alloc + copy churn for trajectories > dozen events. Called from runner hot paths (after-task, flywheel export parity, demos).
#   * to_otel_like (73): json! with full deep copy of attributes + events on every call. If spans exported frequently (logs, sidecars, /status) -> CPU + mem narrow.
#   * Vec push + String/ rfc3339 formatting + Utc::now() x N per replay.
#   * HashMap + serde_json::Value for attrs/events: convenient for OTEL/serde but allocation-heavy and not cache friendly vs fixed small structs or SmallVec<[(&str,Value);8]>.
#   * In usage (runner): spans collected then len() printed / serialized in json output -- if many, clone cost paid before.
#
# ЛОГИЧЕСКИЕ ОШИБКИ / LOGICAL ERRORS:
#   * Trace ID isolation (lib.rs:30,119): Span::new() *always* does `let trace_id = Uuid::new_v4()...`; `current = Span::new("phase_..")` in replay loop assigns *brand new trace_id per phase*. No sharing of root trace_id across chunks. Breaks end-to-end tracing. Python: create_span re-uses parent's trace_id + builds parent_stack.
#   * Missing hierarchy (everywhere): parent_span_id always None. replay never wires causal links between task_ -> phase_ spans. Python builds lightweight parent_stack for task lifecycle events.
#   * PRM placement bug (123): `if let Some(p) = prm_overall { current.attach_prm... }` is done *only on the final current after the loop*. All earlier spans pushed in the if i%4 (the task_ and intermediate phases) receive *zero* prm info. Python: attaches prm_overall (and per-step) to *every* span + special root.
#   * Replay chunking (116): magic "i % 4", phase names from index/4, event at boundary attributed to old span. Arbitrary, not semantic (no "llm_call.*" naming like py, no per-event spans).
#   * OTEL shape mismatch (74): resourceSpans flat "service.name":str , no duration_ms, prm_score at top level of span not in attrs, status={"code":str} vs proper OTEL codes. Python export has richer to_dict + correct attributes array + duration. Breaks compatibility for mixed py/rust pipelines.
#   * finish auto-ok (68) + attach_prm after finish in replay: small state machine issues if error injection wanted.
#   * In new(): full uuid strings (with dashes) vs py .hex or truncated.
#   * No from_dict / roundtrip constructor, no error status in replay path.
#
# ГОНКИ ДАННЫХ / DATA RACES:
#   * None in this crate: Span et al use only owned data + &mut self methods. All constituent types (String, DateTime<Utc>, HashMap, Vec<serde_json::Value>, Option<f64>) are Send + Sync + 'static. Clone is deep but thread-safe. Returned Vec<Span> from replay is owned, no sharing.
#   * Safe to use from multiple tokio tasks (runner uses tokio::runtime for task mgmt subcmd) or std threads: move spans around, no interior mut or statics.
#   * Potential *future* race surface (if this crate evolves to collector): if parallel agents (swarm dispatch, long-horizon concurrent subtasks, flywheel) push to a shared "current trace" or global span vec without synchronization, data race or lost spans. Design today (pass spans out as results) side-steps it. Compare: flywheel uses std::sync::Mutex *only* for ENV_LOCK in tests to serialize mutation.
#   * Workspace tokio + full features; no loom or sanitizers wired for this crate. cargo test -p ... runs tests single-threaded by default for this (no [dev] parallel override).
#   * No Arc<Mutex<...>> or channels (flume/crossbeam) yet for span fan-in from concurrent workers -- would be next step for "swarm observability".
