[package]
name = "agentforge-observability"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
proptest = "1"

# Tuned profiles (ONLY for this crate per SWARM pattern from flywheel): addresses
# alloc/clone bottlenecks inside replay_trajectory_to_spans + to_otel_like
# (per-event HashMap + deep Span clones of events/attributes/Values + json! trees).
# Faster release for production use in runner/flywheel/continuous + eval paths.
# Slightly faster dev for iteration on observability tests.
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1

