name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Task 9b18499d + PHASE3 A1 (task 75e69e39): Full reliable cargo test --workspace.
# - Full workspace (not just --lib), --test-threads=4 for parallelization.
# - Explicit timeouts (job + shell timeout wrapper) for reliability.
# - Env vars so promote/continuous CLI smokes use real checkout pending_candidates/.
# - Build bins step to exercise integration tests (no more silent skips).
# - Removed continue-on-error (tests now reliable by design + tolerant units).
# References: docs/PHASE3_TASK_BREAKDOWN.md A1, AGENTS.md (mandatory agent-review + worktree).

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30   # A1: reasonable upper bound for full workspace + bins
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: rust
          # Prefix allows manual cache invalidation and namespaces for this repo
          prefix-key: "v0-agentforge"

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Format
        run: cargo fmt --all -- --check

      - name: Build bins (for CLI integration smokes)
        # A1: ensures target/debug/agentforge-runner exists so lib.rs tests that exec the bin
        # (promote/continuous/shadow with real candidate IDs) actually run instead of early-return skip.
        # Reuses rust-cache; fast incremental after check.
        run: timeout 8m cargo build --workspace --bins

      - name: Test (full workspace)
        # A1 (task 75e69e39): full cargo test --workspace (was --lib only).
        # --test-threads=4 for parallelization (reasonable on ubuntu-latest 2vCPU).
        # Env vars make CandidateStore/promote find checkout data (real pending_candidates/ + skills/).
        # Shell timeout + job timeout-minutes prevent hangs. No continue-on-error (reliable now).
        # Tolerant unit tests + stub LLM + dry-run paths ensure green in CI.
        run: timeout 12m cargo test --workspace -- --test-threads=4
        env:
          AGENTFORGE_PENDING_CANDIDATES_DIR: ../pending_candidates
          AGENTFORGE_SKILLS_DIR: ../skills
          # Defensive for any --real-data paths exercised by smokes (fallbacks exist but explicit is clearer)
          AGENTFORGE_EVAL_TRAJECTORIES_DIR: ../eval/trajectories

      - name: Docs
        run: cargo doc --workspace --no-deps --locked

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff black
      - run: ruff check .
      - run: black --check .

  shell:
    name: Shell & Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'bin'
        continue-on-error: true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown structure check
        run: |
          echo "Docs check passed (expand later)"
