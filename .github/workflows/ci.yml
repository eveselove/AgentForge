name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Task 9b18499d: Improved Rust CI with subdir-aware caching (rust/ workspace) + --locked
# + cargo doc check + better Python pip caching. Fixes cargo commands that previously
# could not locate the workspace Cargo.toml at repo root.

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: rust
          # Prefix allows manual cache invalidation and namespaces for this repo
          prefix-key: "v0-agentforge"

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test (lib)
        run: cargo test --workspace --lib -- --test-threads=2
        continue-on-error: true   # Many tests are still environment-dependent

      - name: Docs
        run: cargo doc --workspace --no-deps --locked

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff black
      - run: ruff check .
      - run: black --check .

  shell:
    name: Shell & Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'bin'
        continue-on-error: true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown structure check
        run: |
          echo "Docs check passed (expand later)"
