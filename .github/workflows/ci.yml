name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Task 9b18499d: Improved Rust CI with subdir-aware caching (rust/ workspace) + --locked
# + cargo doc check + better Python pip caching. Fixes cargo commands that previously
# could not locate the workspace Cargo.toml at repo root.
#
# B2 (task e6709411 / CM-Phase3-02): Python parity harness integrated as dedicated job.
# - Uses hermetic --ci-smoke (golden fixtures + skeleton + unittests only; see parity_harness.py: _run_ci_smoke).
# - Clear pass/fail criteria: goldens_load + self_compare_clean + skeleton_shape + unittest_hermetic.
# - DECISION (per user query + Phase3 B2/B3/B5): ADVISORY / non-blocking for now (continue-on-error: true).
#   Rationale: harness is transitional migration tooling (Phase 4 Python flywheel removal target after soak);
#   known tolerated gaps (learning_value, proposal richness, manifest minimalism) documented in PARITY_REPORT_PHASE1*.
#   Job provides visibility + catches harness regressions. Rich fidelity_pass/composite_score are signals, not gates.
#   Promotion path: flip flag + add to required checks after Python removal or explicit numeric policy (B5).
# - Matches existing softness pattern (Rust lib tests, shellcheck).
# - Artifacts: PARITY_REPORT + any fidelity JSONs for agent consumption (B4).
# - Also lightly covers B1 "Python health checks" via eval test suite (advisory step).
# Traceability: task e6709411, AGENTS.md (worktree, pre-commit, mandatory agent-review before PR).
#
# PHASE2 A3 + A4 (docs/REMAINING_CLOSURE_TASKS_2026-06.md):
# - Added "pr-traceability" job (pull_request only): hard gate. Fails PR unless title or body
#   contains Task ID (task XXXXXX) or Jules session (Jules 12... or jules/<id>). Regex synced
#   with bin/validate-commit-msg. Enforces BRANCHING_STRATEGY.md + AGENTS.md at CI layer.
# - Added "agent-review-link" job + bin/check-agent-review-link.sh (A4): *warn-only* (never
#   fails). Emits ::warning:: + log if branch matches agent/ or jules/ but PR lacks evidence
#   of linked agent-review ( "agent-review", handoff ID, jules-review-*, AGENT_REVIEW_HANDOFF ).
#   Per AGENTS.md: agent-generated changes require running the agent-review skill + recording
#   handoff *before* PR is ready for merge. Complements PR template checklist. Non-blocking
#   to match current Level M2 (0-approval + judgment via agent-review) per
#   docs/BRANCH_PROTECTION_A7_DECISION.md. Future: may become blocking after full rollout.

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: rust
          # Prefix allows manual cache invalidation and namespaces for this repo
          prefix-key: "v0-agentforge"

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test (lib)
        run: cargo test --workspace --lib -- --test-threads=2
        continue-on-error: true   # Many tests are still environment-dependent

      - name: Docs
        run: cargo doc --workspace --no-deps --locked

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff black
      - run: ruff check .
      - run: black --check .
      # B1 nod (Python health checks): run the hermetic eval test battery (advisory, not gate yet).
      - name: Python health (eval test suite)
        run: python -m agentforge.eval.run_tests || true
        continue-on-error: true

  parity:
    name: Python Parity Harness (advisory, B2 task e6709411)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install pyyaml
      - name: Run parity harness CI smoke (hermetic golden + skeleton; clear pass/fail per B2)
        run: |
          # Direct script exec triggers bootstrap (works regardless of checkout dir name).
          # --ci-smoke: goldens + normalize/self-compare + skeleton stub + hermetic unittests.
          # Exit 0/1 with JSON or banner. See learning/flywheel_parity/parity_harness.py:_run_ci_smoke.
          python learning/flywheel_parity/parity_harness.py --ci-smoke --json
        # ADVISORY: do not block PRs. See top comment for full decision + promotion path.
        continue-on-error: true
      - name: Upload parity artifacts (report + fidelity JSONs for agents)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-harness-results-${{ github.run_id }}
          path: |
            learning/flywheel_parity/PARITY_REPORT_PHASE1.md
            /tmp/shadow_fidelity*.json
            /tmp/agentforge_rust_flywheel/shadow_fidelity_aggregate.json
          retention-days: 7

  shell:
    name: Shell & Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'bin'
        continue-on-error: true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Markdown structure check
        run: |
          echo "Docs check passed (expand later)"

  # PR-level gates (A3 + A4 from REMAINING_CLOSURE_TASKS_2026-06.md).
  # These complement local pre-commit + bin/validate-commit-msg.
  pr-traceability:
    name: PR Traceability (Task/Jules ID required in title or body)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce task or jules reference in PR
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -euo pipefail
          COMBINED="$TITLE $BODY"
          # Keep in sync with bin/validate-commit-msg
          if echo "$COMBINED" | grep -qE '(task[[:space:]]*[0-9a-fA-F]{6,}|jules[[:space:]]*[0-9]{10,}|JULES_[0-9]+|Jules[[:space:]]*[0-9]+|task[[:space:]]*[0-9a-zA-Z_-]{6,})'; then
            echo "✅ PR traceability OK (Task ID or Jules session found)"
          else
            echo "❌ Missing Task ID or Jules session in PR title or body."
            echo "   Required (examples): task 3bb7b46d  |  Jules 12237721410778183159  |  task abcd1234"
            echo "   See docs/BRANCHING_STRATEGY.md, AGENTS.md, and bin/validate-commit-msg"
            exit 1
          fi

  agent-review-link:
    name: Agent-Review Link Check (warn-only on agent/ and jules/ PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Run lightweight agent-review linkage warning
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          bash bin/check-agent-review-link.sh
